---
- name: Converge repos syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    repos_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.repos for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.repos
      when: repos_molecule_execute_role | bool

    - name: Record lit.ubuntu.repos Molecule coverage mode
      ansible.builtin.set_fact:
        repos_molecule_coverage_mode: syntax_stub
