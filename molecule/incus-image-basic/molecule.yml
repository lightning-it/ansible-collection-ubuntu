---
driver:
  name: docker

dependency:
  name: galaxy
  options:
    requirements-file: "${MOLECULE_PROJECT_DIRECTORY}/collections/requirements.yml"

platforms:
  - name: incus_image
    image: ubuntu:24.04
    pre_build_image: true
    command: sleep infinity

provisioner:
  name: ansible
  inventory:
    hosts:
      all:
        hosts:
          incus_image:
            ansible_connection: docker
  playbooks:
    converge: converge.yml
    verify: verify.yml

scenario:
  name: incus-image-basic
  test_sequence:
    - dependency
    - syntax
    - converge
    - idempotence
    - verify

verifier:
  name: ansible
