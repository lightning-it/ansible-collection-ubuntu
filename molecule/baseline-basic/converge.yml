---
- name: Converge baseline syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    baseline_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.baseline for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.baseline
      when: baseline_molecule_execute_role | bool

    - name: Record lit.ubuntu.baseline Molecule coverage mode
      ansible.builtin.set_fact:
        baseline_molecule_coverage_mode: syntax_stub
