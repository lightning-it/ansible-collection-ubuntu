---
- name: Converge baseline syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    baseline_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.baseline for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.baseline
      when: baseline_molecule_execute_role | bool

    - name: Record lit.ubuntu.baseline Molecule coverage marker
      ansible.builtin.copy:
        dest: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/baseline-syntax-coverage"
        content: "syntax_stub\n"
        mode: "0644"
