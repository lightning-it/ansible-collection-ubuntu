---
- name: Converge firefox syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    firefox_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.firefox for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.firefox
      when: firefox_molecule_execute_role | bool

    - name: Record lit.ubuntu.firefox Molecule coverage marker
      ansible.builtin.copy:
        dest: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/firefox-syntax-coverage"
        content: "syntax_stub\n"
        mode: "0644"
