---
- name: Converge firefox deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    firefox_deploy_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.firefox_deploy for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.firefox_deploy
      when: firefox_deploy_molecule_execute_role | bool

    - name: Record lit.ubuntu.firefox_deploy Molecule coverage mode
      ansible.builtin.set_fact:
        firefox_deploy_molecule_coverage_mode: syntax_stub
