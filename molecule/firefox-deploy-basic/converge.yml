---
- name: Converge firefox deploy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    firefox_deploy_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.firefox_deploy for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.firefox_deploy
      when: firefox_deploy_molecule_execute_role | bool

    - name: Record lit.ubuntu.firefox_deploy Molecule coverage marker
      ansible.builtin.copy:
        dest: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/firefox_deploy-syntax-coverage"
        content: "syntax_stub\n"
        mode: "0644"
