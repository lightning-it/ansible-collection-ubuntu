---
- name: Converge vscode syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vscode_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.vscode for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.vscode
      when: vscode_molecule_execute_role | bool

    - name: Record lit.ubuntu.vscode Molecule coverage marker
      ansible.builtin.copy:
        dest: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/vscode-syntax-coverage"
        content: "syntax_stub\n"
        mode: "0644"
