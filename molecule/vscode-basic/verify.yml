---
- name: Verify vscode syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check lit.ubuntu.vscode coverage marker
      ansible.builtin.stat:
        path: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/vscode-syntax-coverage"
      register: vscode_molecule_coverage_marker

    - name: Assert lit.ubuntu.vscode coverage stub ran
      ansible.builtin.assert:
        that:
          - vscode_molecule_coverage_marker.stat.exists
        quiet: true
