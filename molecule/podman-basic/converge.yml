---
- name: Converge podman syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    podman_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.podman for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.podman
      vars:
        podman_user_socket_enabled: true
        podman_user_socket_users:
          - root
      when: podman_molecule_execute_role | bool

    - name: Record lit.ubuntu.podman Molecule coverage marker
      ansible.builtin.copy:
        dest: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/podman-syntax-coverage"
        content: "syntax_stub\n"
        mode: "0644"
