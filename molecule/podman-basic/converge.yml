---
- name: Converge podman syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    podman_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.podman for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.podman
      when: podman_molecule_execute_role | bool

    - name: Record lit.ubuntu.podman Molecule coverage mode
      ansible.builtin.set_fact:
        podman_molecule_coverage_mode: syntax_stub
