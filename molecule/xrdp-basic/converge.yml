---
- name: Converge xrdp syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    xrdp_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.xrdp for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.xrdp
      when: xrdp_molecule_execute_role | bool

    - name: Record lit.ubuntu.xrdp Molecule coverage marker
      ansible.builtin.copy:
        dest: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/xrdp-syntax-coverage"
        content: "syntax_stub\n"
        mode: "0644"
