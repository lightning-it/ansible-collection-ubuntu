---
- name: Converge firefox config syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    firefox_config_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.firefox_config for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.firefox_config
      when: firefox_config_molecule_execute_role | bool

    - name: Record lit.ubuntu.firefox_config Molecule coverage marker
      ansible.builtin.copy:
        dest: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/firefox_config-syntax-coverage"
        content: "syntax_stub\n"
        mode: "0644"
