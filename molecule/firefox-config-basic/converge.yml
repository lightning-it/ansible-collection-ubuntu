---
- name: Converge firefox config syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    firefox_config_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.firefox_config for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.firefox_config
      when: firefox_config_molecule_execute_role | bool

    - name: Record lit.ubuntu.firefox_config Molecule coverage mode
      ansible.builtin.set_fact:
        firefox_config_molecule_coverage_mode: syntax_stub
