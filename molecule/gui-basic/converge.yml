---
- name: Converge gui syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    gui_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.gui for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.gui
      when: gui_molecule_execute_role | bool

    - name: Record lit.ubuntu.gui Molecule coverage marker
      ansible.builtin.copy:
        dest: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/gui-syntax-coverage"
        content: "syntax_stub\n"
        mode: "0644"
