---
dependency:
  name: galaxy
driver:
  name: default
platforms:
  - name: netplan
provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    verify: verify.yml
  inventory:
    hosts:
      all:
        hosts:
          netplan:
            ansible_connection: local
            ansible_python_interpreter: "{{ ansible_playbook_python }}"
verifier:
  name: ansible
