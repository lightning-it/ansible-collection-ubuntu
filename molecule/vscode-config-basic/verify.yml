---
- name: Verify vscode config syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check lit.ubuntu.vscode_config coverage marker
      ansible.builtin.stat:
        path: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/vscode_config-syntax-coverage"
      register: vscode_config_molecule_coverage_marker

    - name: Assert lit.ubuntu.vscode_config coverage stub ran
      ansible.builtin.assert:
        that:
          - vscode_config_molecule_coverage_marker.stat.exists
        quiet: true
