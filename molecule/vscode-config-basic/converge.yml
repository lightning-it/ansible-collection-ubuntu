---
- name: Converge vscode config syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vscode_config_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.vscode_config for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.vscode_config
      when: vscode_config_molecule_execute_role | bool

    - name: Record lit.ubuntu.vscode_config Molecule coverage marker
      ansible.builtin.copy:
        dest: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/vscode_config-syntax-coverage"
        content: "syntax_stub\n"
        mode: "0644"
