---
- name: Converge users syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    users_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.users for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.users
      when: users_molecule_execute_role | bool

    - name: Record lit.ubuntu.users Molecule coverage mode
      ansible.builtin.set_fact:
        users_molecule_coverage_mode: syntax_stub
