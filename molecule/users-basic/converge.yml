---
- name: Converge users syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    users_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.users for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.users
      when: users_molecule_execute_role | bool

    - name: Record lit.ubuntu.users Molecule coverage marker
      ansible.builtin.copy:
        dest: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/users-syntax-coverage"
        content: "syntax_stub\n"
        mode: "0644"
