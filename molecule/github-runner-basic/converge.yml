---
- name: Converge github_runner
  hosts: github_runner
  become: false
  gather_facts: false
  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
    github_runner_enabled: false

  pre_tasks:
    - name: Ensure python3 is present
      ansible.builtin.raw: |
        if ! command -v python3 >/dev/null 2>&1; then
          apt-get update && apt-get -y install python3
        fi
      changed_when: false

  roles:
    - role: lit.ubuntu.github_runner
