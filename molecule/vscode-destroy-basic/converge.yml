---
- name: Converge vscode destroy syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vscode_destroy_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.vscode_destroy for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.vscode_destroy
      when: vscode_destroy_molecule_execute_role | bool

    - name: Record lit.ubuntu.vscode_destroy Molecule coverage marker
      ansible.builtin.copy:
        dest: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/vscode_destroy-syntax-coverage"
        content: "syntax_stub\n"
        mode: "0644"
