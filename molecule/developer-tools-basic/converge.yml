---
- name: Converge developer tools syntax coverage
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    developer_tools_molecule_execute_role: false
  tasks:
    - name: Import lit.ubuntu.developer_tools for syntax coverage
      ansible.builtin.import_role:
        name: lit.ubuntu.developer_tools
      when: developer_tools_molecule_execute_role | bool

    - name: Record lit.ubuntu.developer_tools Molecule coverage marker
      ansible.builtin.copy:
        dest: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/developer_tools-syntax-coverage"
        content: "syntax_stub\n"
        mode: "0644"
