---
repos:
  # >>> BEGIN shared-assets-lit pre-commit
  - repo: local
    hooks:
      # -------------------------------------------------------------------
      # yamllint (via ee-wunder-devtools-ubi9)
      # -------------------------------------------------------------------
      - id: yamllint-ee
        name: yamllint (via ee-wunder-devtools-ubi9)
        language: system
        entry: bash scripts/wunder-devtools-ee.sh yamllint
        pass_filenames: true
        files: \.(yml|yaml)$

      # -------------------------------------------------------------------
      # ansible-lint (via ee-wunder-devtools-ubi9)
      # -------------------------------------------------------------------
      - id: ansible-lint-ee
        name: ansible-lint (via ee-wunder-devtools-ubi9)
        language: system
        entry: bash scripts/devtools-ansible-lint.sh
        pass_filenames: false
        always_run: true

      # -------------------------------------------------------------------
      # Changelog policy (via ee-wunder-devtools-ubi9)
      # -------------------------------------------------------------------
      - id: changelog-policy-ee
        name: changelog policy (via ee-wunder-devtools-ubi9)
        language: system
        entry: bash scripts/devtools-changelog-check.sh
        pass_filenames: false
        always_run: true

      # -------------------------------------------------------------------
      # Molecule tests non-heavy scenarios (via ee-wunder-devtools-ubi9)
      # -------------------------------------------------------------------
      - id: molecule-light
        name: molecule tests non-heavy scenarios (via ee-wunder-devtools-ubi9)
        language: system
        entry: bash scripts/devtools-molecule.sh
        pass_filenames: false
        always_run: true

      # -------------------------------------------------------------------
      # GitHub Actions workflow linting (actionlint)
      # -------------------------------------------------------------------
      - id: github-actions-lint
        name: GitHub Actions workflow linting (actionlint)
        language: system
        entry: >-
          bash scripts/wunder-devtools-ee.sh bash -lc
          'if ! docker info >/dev/null 2>&1; then
          if [ "${CI:-false}" = "true" ] || [ "${GITHUB_ACTIONS:-false}" = "true" ];
          then echo "ERROR: Docker API is required for actionlint in CI." >&2; exit 1; fi;
          echo "Skipping actionlint because Docker API is unavailable locally." >&2; exit 0; fi;
          docker run --rm -v "$WUNDER_DEVTOOLS_HOST_WORKSPACE":/repo -w /repo docker.io/rhysd/actionlint:latest'
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$

      # -------------------------------------------------------------------
      # Renovate config linting (renovate-config-validator)
      # -------------------------------------------------------------------
      - id: renovate-config-validate
        name: renovate config linting (renovate-config-validator)
        language: system
        pass_filenames: false
        files: ^renovate\.json$
        entry: >-
          bash scripts/wunder-devtools-ee.sh bash -lc
          'if ! docker info >/dev/null 2>&1; then
          if [ "${CI:-false}" = "true" ] || [ "${GITHUB_ACTIONS:-false}" = "true" ];
          then echo "ERROR: Docker API is required for renovate-config-validator in CI." >&2; exit 1; fi;
          echo "Skipping renovate config validation because Docker API is unavailable locally." >&2; exit 0; fi;
          docker run --rm -v "$WUNDER_DEVTOOLS_HOST_WORKSPACE":/repo -w /repo
          docker.io/renovate/renovate:latest renovate-config-validator'

      # -------------------------------------------------------------------
      # ansible-collection smoke test (via ee-wunder-devtools-ubi9)
      # -------------------------------------------------------------------
      - id: collection-smoke
        name: ansible-collection smoke test (via ee-wunder-devtools-ubi9)
        language: system
        entry: bash scripts/devtools-collection-smoke.sh
        pass_filenames: false
        always_run: true

      # -------------------------------------------------------------------
      # Galaxy-style role verification (via ee-wunder-devtools-ubi9)
      # -------------------------------------------------------------------
      - id: galaxy-verify
        name: galaxy-style role verification (via ee-wunder-devtools-ubi9)
        language: system
        entry: bash scripts/devtools-galaxy-verify.sh
        pass_filenames: false
        files: ^(roles/|galaxy\.yml)
  # <<< END shared-assets-lit pre-commit

      # >>> BEGIN repo-specific pre-commit
      # You own everything below this line. The sync job will not touch it.
      # -------------------------------------------------------------------
      # Molecule tests heavy scenarios (via wunder-devtools-ee) (manual)
      # -------------------------------------------------------------------
      - id: molecule-rdp-rhel9-heavy
        name: molecule rdp-rhel9 (Vagrant)
        language: system
        stages: [manual]
        entry: bash scripts/devtools-molecule-rdp-rhel9-heavy.sh
        pass_filenames: false

      - id: molecule-selinux-rhel9-heavy
        name: molecule selinux-rhel9 (Vagrant)
        language: system
        stages: [manual]
        entry: bash scripts/devtools-molecule-selinux-rhel9-heavy.sh
        pass_filenames: false
