# yamllint disable rule:truthy
---
name: Prepare collection release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.2.3
        required: true
      base_branch:
        description: Base branch. Leave empty to prefer develop, then main.
        required: false
        default: ""
      target_branch:
        description: Release PR target branch. Must be main.
        required: false
        default: main
      create_github_release:
        description: Create a GitHub release after merge.
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      publish_galaxy:
        description: Publish to Ansible Galaxy after merge.
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    env:
      RELEASE_BOT_APP_ID: ${{ secrets.RELEASE_BOT_APP_ID }}
      RELEASE_BOT_PRIVATE_KEY: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

    steps:
      - name: Create GitHub App token
        id: app-token
        if: ${{ env.RELEASE_BOT_APP_ID != '' && env.RELEASE_BOT_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ env.RELEASE_BOT_APP_ID }}
          private-key: ${{ env.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Resolve release token
        id: token
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          TOKEN: ${{ secrets.LITRELEASEBOT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${APP_TOKEN:-}" ]; then
            echo "value=$APP_TOKEN" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${TOKEN:-}" ]; then
            echo "value=$TOKEN" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "::error::RELEASE_BOT_APP_ID and RELEASE_BOT_PRIVATE_KEY, or LITRELEASEBOT_TOKEN,"
            echo "are required to create release branches and PRs."
          }
          exit 1

      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ steps.token.outputs.value }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install release tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core antsibull-changelog pyyaml

      - name: Prepare release branch
        env:
          GH_TOKEN: ${{ steps.token.outputs.value }}
          VERSION: ${{ inputs.version }}
          BASE_BRANCH_INPUT: ${{ inputs.base_branch }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          CREATE_GITHUB_RELEASE: ${{ inputs.create_github_release == 'true' }}
          PUBLISH_GALAXY: ${{ inputs.publish_galaxy == 'true' }}
        run: |
          set -euo pipefail

          case "$VERSION" in
            v*) VERSION="${VERSION#v}" ;;
          esac
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must be semantic versioning, for example 1.2.3."
            exit 1
          fi
          if [ "$TARGET_BRANCH" != "main" ]; then
            echo "::error::Collection release PRs must target main."
            exit 1
          fi

          if [ -n "$BASE_BRANCH_INPUT" ]; then
            BASE_BRANCH="$BASE_BRANCH_INPUT"
          elif git ls-remote --exit-code --heads origin develop >/dev/null 2>&1; then
            BASE_BRANCH="develop"
          else
            BASE_BRANCH="$TARGET_BRANCH"
          fi

          RELEASE_BRANCH="release/v${VERSION}"

          git config user.name "litreleasebot"
          git config user.email "litreleasebot@users.noreply.github.com"
          git fetch origin "$BASE_BRANCH" "$TARGET_BRANCH"
          git switch -C "$RELEASE_BRANCH" "origin/$BASE_BRANCH"

          python - <<'PY'
          import os
          from pathlib import Path
          import yaml

          version = os.environ["VERSION"]
          path = Path("galaxy.yml")
          data = yaml.safe_load(path.read_text())
          data["version"] = version
          path.write_text(yaml.safe_dump(data, sort_keys=False, explicit_start=True))
          PY

          antsibull-changelog lint
          antsibull-changelog release
          ansible-galaxy collection build --force

          tarball="$(ls ./*.tar.gz)"
          summary="$(
            awk \
              '/^v'"$VERSION"'$/{flag=1; print; next} /^v[0-9]/{if(flag) exit} flag {print}' \
              CHANGELOG.rst || true
          )"

          git add galaxy.yml changelogs CHANGELOG.rst
          git commit -m "chore(release): prepare v${VERSION}"
          git push --force-with-lease origin "$RELEASE_BRANCH"

          body_file="$(mktemp)"
          {
            echo "## Release v${VERSION}"
            echo
            echo "Base branch: \`${BASE_BRANCH}\`"
            echo "Target branch: \`${TARGET_BRANCH}\`"
            echo "Build artifact: \`${tarball}\`"
            echo "GitHub release creation: \`${CREATE_GITHUB_RELEASE}\`"
            echo "Galaxy publishing: \`${PUBLISH_GALAXY}\`"
            echo
            echo "## Changelog summary"
            echo
            if [ -n "$summary" ]; then
              echo '```rst'
              echo "$summary"
              echo '```'
            else
              echo "See generated changelog files in this PR."
            fi
          } > "$body_file"

          existing="$(
            gh pr list \
              --base "$TARGET_BRANCH" \
              --head "$RELEASE_BRANCH" \
              --state open \
              --json url \
              --jq '.[0].url'
          )"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "Release v${VERSION}" --body-file "$body_file"
          else
            gh pr create \
              --base "$TARGET_BRANCH" \
              --head "$RELEASE_BRANCH" \
              --title "Release v${VERSION}" \
              --body-file "$body_file"
          fi
